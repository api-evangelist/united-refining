name: United Refining Company
description: >-
  United Refining Company is an independent, integrated petroleum company headquartered
  in Warren, Pennsylvania. The company owns and operates a petroleum refinery and
  a network of retail gasoline stations and convenience stores under the Kwik Fill
  and Country Fair brands in the northeastern United States. United Refining does
  not offer publicly documented APIs or developer resources.
